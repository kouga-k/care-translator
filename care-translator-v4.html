<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CareVoice｜介護・医療現場AI通訳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans:wght@300;400;500;600&family=Noto+Sans+Myanmar:wght@400;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f3ee;--surface:#fff;--surface2:#faf8f4;--border:#e2ddd6;
  --accent:#2d6a4f;--accent-light:#40916c;--accent-pale:#d8f3dc;
  --care:#1565c0;--care-pale:#e3f2fd;
  --warn:#c1121f;--warn-bg:#fff0f0;--warn-border:#ffb3b3;
  --text:#1a1a2e;--text-muted:#6b6860;--text-small:#9b9890;
  --font-jp:'Noto Sans JP',sans-serif;--font-en:'Noto Sans',sans-serif;
  --font-display:'DM Serif Display',serif;
  --radius:16px;--shadow:0 4px 24px rgba(0,0,0,.06);--shadow-lg:0 8px 40px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-jp);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.app-logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-family:var(--font-display);font-size:20px;color:var(--accent)}
.logo-sub{font-size:10px;color:var(--text-muted);font-weight:300;letter-spacing:1px;margin-top:-2px}
.header-actions{display:flex;gap:6px}
.btn-icon{width:38px;height:38px;border:1px solid var(--border);background:var(--surface2);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
.btn-icon:hover{background:var(--accent-pale);border-color:var(--accent)}
.ui-lang-btn{padding:6px 10px;border:1px solid var(--border);background:var(--surface2);border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--accent);transition:all .2s;white-space:nowrap}
.ui-lang-btn:hover{background:var(--accent-pale)}
.mode-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.mode-tab{padding:12px 14px;border:none;background:none;cursor:pointer;font-family:var(--font-jp);font-size:13px;font-weight:500;color:var(--text-muted);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.mode-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.care-mode-banner{background:var(--care-pale);border:1px solid #90caf9;border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;display:none}
.care-mode-banner.show{display:flex;align-items:center;gap:10px}
.care-scene-select{flex:1;border:1px solid #90caf9;background:white;border-radius:8px;padding:6px 10px;font-family:var(--font-jp);font-size:13px;font-weight:500;color:var(--care);outline:none}
.main{max-width:700px;margin:0 auto;padding:16px}
.lang-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
.lang-select{flex:1;border:none;background:none;font-family:var(--font-jp);font-size:15px;font-weight:500;color:var(--text);cursor:pointer;outline:none;-webkit-appearance:none}
.lang-swap{width:36px;height:36px;background:var(--accent-pale);border:none;border-radius:50%;cursor:pointer;font-size:16px;transition:all .3s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lang-swap:hover{background:var(--accent);color:white;transform:rotate(180deg)}
.lang-label{font-size:11px;color:var(--text-small);font-weight:300;letter-spacing:.5px}
#mode-text,#mode-conv,#mode-live{display:none}
#mode-text.active,#mode-conv.active,#mode-live.active{display:block}
.input-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.input-card-label{font-size:11px;font-weight:500;color:var(--text-small);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.text-input{width:100%;border:none;background:none;font-family:var(--font-jp);font-size:16px;color:var(--text);resize:none;outline:none;min-height:80px;line-height:1.7}
.text-input::placeholder{color:var(--text-small)}
.input-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.input-tools{display:flex;gap:6px;flex-wrap:wrap}
.tool-btn{padding:6px 10px;border:1px solid var(--border);background:var(--surface2);border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font-jp);color:var(--text-muted);transition:all .2s;display:flex;align-items:center;gap:4px}
.tool-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-pale)}
.tool-btn.active{background:var(--accent);color:white;border-color:var(--accent)}
.tool-btn.care-active{background:var(--care);color:white;border-color:var(--care)}
.translate-btn{padding:10px 20px;background:var(--accent);color:white;border:none;border-radius:10px;font-family:var(--font-jp);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.translate-btn:hover{background:var(--accent-light);transform:translateY(-1px);box-shadow:0 4px 12px rgba(45,106,79,.3)}
.translate-btn:disabled{background:var(--text-small);cursor:not-allowed;transform:none;box-shadow:none}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-section{padding:16px;border-bottom:1px solid var(--border)}
.result-section:last-child{border-bottom:none}
.result-label{font-size:11px;font-weight:500;color:var(--text-small);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.result-simplified{font-size:13px;color:var(--text-muted);line-height:1.7;font-style:italic}
.result-main{font-size:22px;font-weight:500;color:var(--text);line-height:1.5;font-family:var(--font-en)}
.result-back{font-size:15px;color:var(--text);line-height:1.7}
.result-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.play-btn{padding:8px 14px;background:var(--accent-pale);border:1px solid var(--accent);border-radius:8px;cursor:pointer;font-family:var(--font-jp);font-size:13px;color:var(--accent);font-weight:500;transition:all .2s;display:flex;align-items:center;gap:5px}
.play-btn:hover{background:var(--accent);color:white}
.copy-btn{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:var(--font-jp);font-size:13px;color:var(--text-muted);transition:all .2s;display:flex;align-items:center;gap:5px}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-ok{background:var(--accent-pale);color:var(--accent)}
.badge-warn{background:var(--warn-bg);color:var(--warn)}
.badge-engine{background:#e8f4fd;color:#1a6fa0}
.badge-care{background:var(--care-pale);color:var(--care)}
.badge-glossary{background:#fff8e1;color:#e65100}
.glossary-hits{background:#fff8e1;border:1px solid #ffe082;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12px;color:#5d4037}
.glossary-hit-item{display:flex;gap:6px;margin-bottom:4px}
.glossary-hit-item:last-child{margin-bottom:0}
.conv-container{display:flex;flex-direction:column;gap:12px}
.conv-messages{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;min-height:200px;max-height:400px;overflow-y:auto;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:16px}
.conv-msg{animation:slideUp .3s ease}
.conv-msg-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.conv-msg-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.msg-jp .conv-msg-icon{background:#e3f2fd;color:#1565c0}
.msg-foreign .conv-msg-icon{background:var(--accent-pale);color:var(--accent)}
.conv-msg-original{font-size:12px;color:var(--text-small);margin-bottom:4px}
.conv-msg-translated{font-size:17px;font-weight:500;color:var(--text);margin-bottom:4px}
.conv-msg-back{font-size:12px;color:var(--text-muted)}
.conv-input-area{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.conv-speaker-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.speaker-btn{padding:12px;border:2px solid var(--border);background:var(--surface2);border-radius:12px;cursor:pointer;font-family:var(--font-jp);font-size:13px;font-weight:500;color:var(--text-muted);transition:all .2s;text-align:center}
.speaker-btn.active-jp{border-color:#1565c0;background:#e3f2fd;color:#1565c0}
.speaker-btn.active-foreign{border-color:var(--accent);background:var(--accent-pale);color:var(--accent)}
.conv-mic-area{display:flex;gap:8px;align-items:center}
.conv-text-in{flex:1;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-family:var(--font-jp);font-size:15px;outline:none;background:var(--surface2)}
.conv-text-in:focus{border-color:var(--accent);background:white}
.mic-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.mic-btn-jp{background:#e3f2fd;color:#1565c0}
.mic-btn-jp:hover,.mic-btn-jp.recording{background:#1565c0;color:white}
.mic-btn-foreign{background:var(--accent-pale);color:var(--accent)}
.mic-btn-foreign:hover,.mic-btn-foreign.recording{background:var(--accent);color:white}
.mic-btn.recording{animation:pulse 1s infinite}
.send-btn{width:44px;height:44px;border-radius:50%;border:none;background:var(--accent);color:white;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.send-btn:hover{background:var(--accent-light)}
.live-container{display:flex;flex-direction:column;gap:12px}
.live-status-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
.live-indicator{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500}
.live-dot{width:10px;height:10px;border-radius:50%;background:var(--text-small)}
.live-dot.active{background:var(--warn);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.live-mic-btn{padding:12px 24px;border:none;border-radius:12px;cursor:pointer;font-family:var(--font-jp);font-size:15px;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:8px}
.live-mic-btn.idle{background:var(--accent);color:white}
.live-mic-btn.running{background:var(--warn);color:white;animation:pulse 1.5s infinite}
.live-display{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);min-height:200px}
.live-original{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:12px;color:var(--text-small);min-height:40px;line-height:1.5}
.live-translated{padding:24px 20px;font-size:26px;font-weight:500;color:var(--text);line-height:1.5;min-height:120px}
.live-back-check{padding:12px 16px;border-top:1px solid var(--border);background:#f8fffe;display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--text-muted);min-height:44px}
.live-back-label{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.5px;flex-shrink:0;margin-top:1px}
.live-history{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);max-height:300px;overflow-y:auto}
.live-history-title{font-size:12px;font-weight:500;color:var(--text-small);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.live-history-item{padding:10px 0;border-bottom:1px solid var(--border);animation:slideUp .3s ease}
.live-history-item:last-child{border-bottom:none}
.history-original{font-size:11px;color:var(--text-small);margin-bottom:3px}
.history-translated{font-size:15px;color:var(--text);font-weight:500;margin-bottom:3px}
.history-back{font-size:11px;color:var(--text-muted)}
/* UI言語選択モーダル */
.uilang-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.uilang-overlay.open{display:flex}
.uilang-modal{background:var(--surface);border-radius:20px;width:100%;max-width:360px;box-shadow:var(--shadow-lg);animation:modalIn .3s ease;overflow:hidden}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.uilang-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.uilang-title{font-size:18px;font-weight:600}
.uilang-close{width:32px;height:32px;border:none;background:var(--surface2);border-radius:8px;cursor:pointer;font-size:16px}
.uilang-list{padding:12px}
.uilang-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:all .2s;font-size:15px}
.uilang-item:hover{background:var(--accent-pale)}
.uilang-item.selected{background:var(--accent-pale);color:var(--accent);font-weight:600}
.uilang-flag{font-size:22px;flex-shrink:0}
/* 用語集モーダル */
.glossary-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-start;justify-content:center;padding:16px;backdrop-filter:blur(4px);overflow-y:auto}
.glossary-overlay.open{display:flex}
.glossary-modal{background:var(--surface);border-radius:20px;width:100%;max-width:540px;margin:auto;box-shadow:var(--shadow-lg);animation:modalIn .3s ease}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:18px;font-weight:600}
.modal-close{width:32px;height:32px;border:none;background:var(--surface2);border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:20px 24px}
.glossary-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.glossary-tab{padding:8px 14px;border:2px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-muted);background:var(--surface2);transition:all .2s}
.glossary-tab.active{border-color:var(--accent);color:var(--accent);background:var(--accent-pale)}
.glossary-search{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-family:var(--font-jp);font-size:14px;outline:none;background:var(--surface2);margin-bottom:12px}
.glossary-search:focus{border-color:var(--accent);background:white}
.glossary-list{max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:10px}
.glossary-item{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px}
.glossary-item:last-child{border-bottom:none}
.glossary-item-content{flex:1}
.glossary-term{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.glossary-simple{font-size:13px;color:var(--accent);margin-bottom:2px}
.glossary-note{font-size:12px;color:var(--text-muted)}
.glossary-del-btn{width:28px;height:28px;border:1px solid var(--warn-border);background:var(--warn-bg);border-radius:6px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--warn);flex-shrink:0}
.add-glossary-form{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:16px}
.add-glossary-title{font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:12px}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-input{flex:1;min-width:120px;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:var(--font-jp);font-size:13px;outline:none;background:white}
.form-input:focus{border-color:var(--accent)}
.form-add-btn{padding:8px 16px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-family:var(--font-jp);font-size:13px;font-weight:500;white-space:nowrap}
/* 設定モーダル */
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.settings-overlay.open{display:flex}
.settings-modal{background:var(--surface);border-radius:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn .3s ease}
.setting-group{margin-bottom:24px}
.setting-group-title{font-size:12px;font-weight:600;color:var(--text-small);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.setting-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:12px}
.setting-item:last-child{border-bottom:none}
.setting-label{font-size:14px;font-weight:500}
.setting-desc{font-size:12px;color:var(--text-muted);margin-top:2px}
.setting-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:monospace;font-size:13px;outline:none;background:var(--surface2);margin-top:8px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{display:none}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:24px;cursor:pointer;transition:.3s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;left:3px;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px)}
.engine-options{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.engine-opt{padding:8px 14px;border:2px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-muted);background:var(--surface2);transition:all .2s}
.engine-opt.selected{border-color:var(--accent);color:var(--accent);background:var(--accent-pale)}
/* リスクモーダル */
.risk-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.risk-overlay.open{display:flex}
.risk-modal{background:var(--surface);border-radius:20px;width:100%;max-width:420px;box-shadow:var(--shadow-lg);animation:modalIn .3s ease;overflow:hidden}
.risk-modal-top{background:var(--warn-bg);border-bottom:1px solid var(--warn-border);padding:20px 24px;text-align:center}
.risk-icon{font-size:40px;margin-bottom:8px}
.risk-title{font-size:18px;font-weight:700;color:var(--warn);margin-bottom:4px}
.risk-subtitle{font-size:13px;color:var(--text-muted)}
.risk-modal-body{padding:20px 24px}
.risk-reason{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:10px;padding:12px;font-size:14px;color:var(--warn);margin-bottom:16px}
.risk-modal-actions{display:flex;gap:8px}
.risk-btn-cancel{flex:1;padding:12px;border:2px solid var(--border);background:var(--surface2);border-radius:12px;cursor:pointer;font-family:var(--font-jp);font-size:14px;font-weight:600;color:var(--text-muted)}
.risk-btn-proceed{flex:1;padding:12px;background:var(--warn);border:none;border-radius:12px;cursor:pointer;font-family:var(--font-jp);font-size:14px;font-weight:600;color:white}
.loading-dots{display:flex;gap:4px;align-items:center;padding:20px;justify-content:center}
.loading-dots span{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:dot 1.2s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#1a1a2e;color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:500;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.footer-pad{height:24px}
@media(max-width:480px){.result-main{font-size:19px}.live-translated{font-size:22px}}

<header class="app-header">
  <div class="app-logo">
    <div class="logo-icon">🌿</div>
    <div>

      <div class="logo-sub" id="logoSub">介護・医療現場AI通訳</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="ui-lang-btn" onclick="openUiLang()" id="uiLangBtn">🌐 日本語</button>
    <button class="btn-icon" onclick="openGlossary()" title="用語集">📖</button>

  </div>
</header>

<div class="mode-tabs">

  <button class="mode-tab" id="tab-live" onclick="switchMode('live',this)">⚡ <span data-i18n="tab_live">同時通訳</span></button>
</div>

<div class="main">

      </select>
    </div>
  </div>

  <!-- 介護モードバナー -->
  <div class="care-mode-banner" id="careModeBanner">
    <span>🏥</span>
    <select class="care-scene-select" id="careScene" onchange="state.careScene=this.value"></select>
  </div>

  <!-- テキスト翻訳 -->
  <div id="mode-text" class="active">
    <div class="input-card">
      <div class="input-card-label" data-i18n="input_label">入力テキスト</div>
      <textarea class="text-input" id="textInput" rows="4"></textarea>
      <div class="input-actions">
        <div class="input-tools">
          <button class="tool-btn" id="micBtn" onclick="toggleMicText()">🎤 <span data-i18n="voice">音声</span></button>
          <button class="tool-btn" id="careModeBtn" onclick="toggleCareMode()">🏥 <span data-i18n="care_mode">介護モード</span></button>
          <button class="tool-btn" onclick="clearText()">✕</button>
        </div>
        <button class="translate-btn" id="translateBtn" onclick="doTranslate()"><span data-i18n="translate">翻訳</span> →</button>
      </div>
    </div>
    <div id="textResult"></div>
  </div>

  <!-- 会話モード -->
  <div id="mode-conv">
    <div class="conv-container">
      <div class="conv-messages" id="convMessages">
        <div style="text-align:center;color:var(--text-small);font-size:13px;padding:20px 0" data-i18n-el="conv_hint">話す人を選んでマイクを押してください</div>
      </div>
      <div class="conv-input-area">
        <div class="conv-speaker-btns">
          <button class="speaker-btn active-jp" id="speakerJp" onclick="selectSpeaker('jp')">🇯🇵 <span data-i18n="jp_staff">日本人スタッフ</span></button>
          <button class="speaker-btn" id="speakerForeign" onclick="selectSpeaker('foreign')">🌏 <span id="foreignLangLabel">外国人スタッフ</span></button>

          <input class="conv-text-in" id="convTextIn" />
          <button class="mic-btn mic-btn-jp" id="convMicBtn" onclick="toggleConvMic()">🎤</button>
          <button class="send-btn" onclick="sendConvMessage()">→</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 同時通訳 -->
  <div id="mode-live">
    <div class="live-container">
      <div class="live-status-bar">
        <div class="live-indicator">
          <div class="live-dot" id="liveDot"></div>
          <span id="liveStatus" data-i18n="standby">待機中</span>
        </div>
        <button class="live-mic-btn idle" id="liveMicBtn" onclick="toggleLive()">🎤 <span data-i18n="start_interp">通訳開始</span></button>
      </div>
      <div class="live-display">
        <div class="live-original" id="liveOriginal"></div>
        <div class="live-translated" id="liveTranslated" style="color:var(--text-small);font-size:18px"></div>
        <div class="live-back-check">
          <span class="live-back-label" data-i18n="check">確認</span>
          <span id="liveBackText" style="color:var(--text-small)"></span>
          <button class="play-btn" id="livePlayBtn" onclick="playLiveAudio()" style="display:none;padding:4px 10px;font-size:12px;margin-left:auto">🔊</button>
        </div>
      </div>
      <div class="live-history">
        <div class="live-history-title">
          <span>📋 <span data-i18n="history">通訳履歴</span></span>
          <button onclick="clearHistory()" style="font-size:11px;border:none;background:none;color:var(--text-small);cursor:pointer" data-i18n="clear">クリア</button>
        </div>
        <div id="liveHistoryList"></div>
      </div>
    </div>

<!-- UI言語選択モーダル -->
<div class="uilang-overlay" id="uilangModal">
  <div class="uilang-modal">
    <div class="uilang-header">
      <div class="uilang-title">🌐 Display Language</div>
      <button class="uilang-close" onclick="closeUiLang()">✕</button>
    </div>
    <div class="uilang-list" id="uilangList"></div>
  </div>
</div>

<!-- 用語集モーダル -->
<div class="glossary-overlay" id="glossaryModal">
  <div class="glossary-modal">
    <div class="modal-header">
      <div class="modal-title">📖 <span data-i18n="glossary">用語集</span></div>
      <button class="modal-close" onclick="closeGlossary()">✕</button>
    </div>
    <div class="modal-body">
      <div class="glossary-tabs" id="glossaryTabs">
        <button class="glossary-tab active" onclick="switchGlossaryTab('official',this)">🏛️ <span data-i18n="g_official">公式やさしい日本語</span></button>
        <button class="glossary-tab" onclick="switchGlossaryTab('care',this)">🏥 <span data-i18n="g_care">介護・医療</span></button>
        <button class="glossary-tab" onclick="switchGlossaryTab('custom',this)">✏️ <span data-i18n="g_custom">施設カスタム</span></button>
      </div>
      <input class="glossary-search" id="glossarySearch" oninput="renderGlossaryList()" />
      <div class="glossary-list" id="glossaryList"></div>
      <div class="add-glossary-form" id="addGlossaryForm" style="display:none">
        <div class="add-glossary-title" data-i18n="add_term">＋ 新しい用語を登録</div>
        <div class="form-row">
          <input class="form-input" id="newTerm" data-i18n-ph="term_ph" />
          <input class="form-input" id="newSimple" data-i18n-ph="simple_ph" />
        </div>
        <div class="form-row">
          <input class="form-input" id="newNote" data-i18n-ph="note_ph" style="flex:2" />
          <button class="form-add-btn" onclick="addCustomTerm()" data-i18n="add">追加</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 設定モーダル -->
<div class="settings-overlay" id="settingsModal">
  <div class="settings-modal">
    <div class="modal-header">
      <div class="modal-title">⚙️ <span data-i18n="settings">設定</span></div>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body" style="padding:20px 24px">
      <div class="setting-group">
        <div class="setting-group-title" data-i18n="engine">翻訳エンジン</div>
        <div class="engine-options">
          <button class="engine-opt selected" onclick="selectEngine('mymemory',this)">🆓 MyMemory<br><span style="font-size:10px;font-weight:300" data-i18n="no_key">APIキー不要</span></button>
          <button class="engine-opt" onclick="selectEngine('google',this)">🔍 Google<br><span style="font-size:10px;font-weight:300" data-i18n="need_key">要APIキー</span></button>
          <button class="engine-opt" onclick="selectEngine('claude',this)">🧠 Claude AI<br><span style="font-size:10px;font-weight:300" data-i18n="need_key">要APIキー</span></button>
        </div>
      </div>
      <div class="setting-group" id="googleKeyGroup" style="display:none">
        <div class="setting-group-title">Google API Key</div>
        <input class="setting-input" id="googleApiKey" type="password" placeholder="AIza..." />
      </div>
      <div class="setting-group" id="claudeKeyGroup" style="display:none">
        <div class="setting-group-title">Claude API Key</div>
        <input class="setting-input" id="claudeApiKey" type="password" placeholder="sk-ant-..." />
      </div>
      <div class="setting-group">
        <div class="setting-group-title" data-i18n="options">オプション</div>
        <div class="setting-item">
          <div><div class="setting-label" data-i18n="polite_mode">丁寧変換モード</div><div class="setting-desc" data-i18n="polite_desc">攻撃的な表現を自動で丁寧な言葉に変換</div></div>
          <label class="toggle"><input type="checkbox" id="politeMode" checked><span class="toggle-slider"></span></label>
        </div>
        <div class="setting-item">
          <div><div class="setting-label" data-i18n="risk_warn">リスク警告</div><div class="setting-desc" data-i18n="risk_desc">危険な表現を検知した場合に確認ダイアログを表示</div></div>
          <label class="toggle"><input type="checkbox" id="riskWarning" checked><span class="toggle-slider"></span></label>
        </div>
        <div class="setting-item">
          <div><div class="setting-label" data-i18n="auto_speak">自動読み上げ</div><div class="setting-desc" data-i18n="auto_speak_desc">翻訳完了後に音声で自動再生</div></div>
          <label class="toggle"><input type="checkbox" id="autoSpeak"><span class="toggle-slider"></span></label>
        </div>
        <div class="setting-item">
          <div><div class="setting-label" data-i18n="back_trans">逆翻訳表示</div><div class="setting-desc" data-i18n="back_desc">翻訳後に逆翻訳して意味のズレを確認</div></div>
          <label class="toggle"><input type="checkbox" id="liveBackTranslate" checked><span class="toggle-slider"></span></label>
        </div>
      </div>
      <button onclick="saveSettings()" style="width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:12px;font-family:var(--font-jp);font-size:15px;font-weight:600;cursor:pointer" data-i18n="save">保存する</button>
    </div>
  </div>
</div>

<!-- リスクモーダル -->
<div class="risk-overlay" id="riskModal">
  <div class="risk-modal">
    <div class="risk-modal-top">
      <div class="risk-icon">⚠️</div>
      <div class="risk-title" data-i18n="risk_title">リスクを検知しました</div>
      <div class="risk-subtitle" data-i18n="risk_sub">このまま翻訳を続けますか？</div>
    </div>
    <div class="risk-modal-body">
      <div class="risk-reason" id="riskReason"></div>
      <div class="risk-modal-actions">
        <button class="risk-btn-cancel" onclick="cancelRisk()" data-i18n="cancel">キャンセル</button>
        <button class="risk-btn-proceed" onclick="proceedRisk()" data-i18n="proceed">このまま翻訳</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ===== i18n適用 =====
function t(key) { return (I18N[uiLang]||I18N.ja)[key] || (I18N.ja)[key] || key; }

function applyI18n() {
  const L = I18N[uiLang] || I18N.ja;
  // data-i18n
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (L[key]) el.textContent = L[key];
  });
  // data-i18n-ph（placeholder）
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const key = el.getAttribute('data-i18n-ph');
    if (L[key]) el.placeholder = L[key];
  });
  // data-i18n-el（innerText）
  document.querySelectorAll('[data-i18n-el]').forEach(el => {
    const key = el.getAttribute('data-i18n-el');
    if (L[key]) el.textContent = L[key];
  });
  // 特定要素
  document.getElementById('logoSub').textContent = L.logo_sub;
  document.getElementById('textInput').placeholder = L.input_ph;
  document.getElementById('convTextIn').placeholder = L.input_ph;
  document.getElementById('uiLangBtn').textContent = `🌐 ${L.name}`;
  document.getElementById('liveOriginal').textContent = L.live_original_hint;
  document.getElementById('liveTranslated').textContent = L.live_hint;
  document.getElementById('liveBackText').textContent = L.live_back_hint;
  if(document.getElementById('glossarySearch')) document.getElementById('glossarySearch').placeholder = L.glossary_search;
  // 介護シーン選択
  const careScene = document.getElementById('careScene');
  if (careScene) {
    careScene.innerHTML = [
      ['general',L.scene_general],['meal',L.scene_meal],['toilet',L.scene_toilet],
      ['medicine',L.scene_medicine],['rehab',L.scene_rehab],['bath',L.scene_bath],
      ['emergency',L.scene_emergency],['vital',L.scene_vital],['night',L.scene_night],['discharge',L.scene_discharge],
    ].map(([v,n])=>`<option value="${v}">${n}</option>`).join('');
  }
  // 介護モードボタン
  const cmb = document.getElementById('careModeBtn');
  if (cmb) {
    cmb.innerHTML = `🏥 <span>${state.careMode ? L.care_mode_on : L.care_mode}</span>`;
    if (state.careMode) cmb.classList.add('care-active'); else cmb.classList.remove('care-active');
  }
  // 音声ボタン
  const mb = document.getElementById('micBtn');
  if (mb && !state.isMicActive) mb.innerHTML = `🎤 <span>${L.voice}</span>`;
  // Live通訳ボタン
  const lb = document.getElementById('liveMicBtn');
  if (lb) lb.innerHTML = state.isLiveActive ? `⏹ <span>${L.stop_interp}</span>` : `🎤 <span>${L.start_interp}</span>`;
  document.getElementById('liveStatus').textContent = state.isLiveActive ? L.interpreting : L.standby;

  document.documentElement.lang = uiLang === 'zh' ? 'zh-CN' : uiLang;
}

// ===== UI言語モーダル =====
function openUiLang() {
  const el = document.getElementById('uilangList');
  el.innerHTML = Object.entries(I18N).map(([code, L]) =>
    `<div class="uilang-item ${code===uiLang?'selected':''}" onclick="setUiLang('${code}')">
      <span class="uilang-flag">${L.flag}</span>
      <span>${L.name}</span>
    </div>`
  ).join('');
  document.getElementById('uilangModal').classList.add('open');
}
function closeUiLang() { document.getElementById('uilangModal').classList.remove('open'); }
function setUiLang(code) {
  uiLang = code;
  localStorage.setItem('careVoiceUiLang', code);
  applyI18n();
  closeUiLang();
  showToast(t('saved'));
}

function loadCustomGlossary() { try{return JSON.parse(localStorage.getItem('careVoiceCustomGlossary')||'[]')}catch(e){return[]} }
function saveCustomGlossary(l) { localStorage.setItem('careVoiceCustomGlossary',JSON.stringify(l)) }
function applyGlossary(text) {
  const all=[...loadCustomGlossary(),...CARE_GLOSSARY,...OFFICIAL_GLOSSARY];
  return all.filter(i=>text.includes(i.term));
}

// ===== テキスト翻訳 =====
async function doTranslate() {
  const text=document.getElementById('textInput').value.trim();
  if(!text){showToast(t('error_input'));return}
  const from=document.getElementById('langFrom').value,to=document.getElementById('langTo').value;
  if(state.riskWarning){const r=detectRisk(text);if(r){state.pendingTranslation={text,from,to};document.getElementById('riskReason').textContent=r;document.getElementById('riskModal').classList.add('open');return}}
  await executeTranslation(text,from,to);
}
function detectRisk(text) {
  const ps=[
    {p:/転倒|倒れ|落ちる|滑る/,r:'転倒リスクに関連する表現が含まれています'},
    {p:/誤嚥|詰まる|飲み込め/,r:'誤嚥リスクに関連する表現が含まれています'},
    {p:/死|亡くなる|危篤/,r:'生命に関わるキーワードが含まれています'},
    {p:/叩|蹴|暴力|怒鳴/,r:'攻撃的・暴力的な表現が含まれています'},
    {p:/早くしろ|動け|立て[よ！]/,r:'強い命令口調が含まれています'},
    {p:/急変|心肺停止|ショック/,r:'緊急事態に関するキーワードが含まれています'},
  ];
  for(const p of ps){if(p.p.test(text))return p.r}return null;
}
function cancelRisk(){document.getElementById('riskModal').classList.remove('open');state.pendingTranslation=null}
function proceedRisk(){document.getElementById('riskModal').classList.remove('open');if(state.pendingTranslation){const{text,from,to}=state.pendingTranslation;state.pendingTranslation=null;executeTranslation(text,from,to)}}

async function executeTranslation(text,from,to) {
  const btn=document.getElementById('translateBtn');btn.disabled=true;btn.innerHTML=`<span>...</span>`;
  const re=document.getElementById('textResult');
  re.innerHTML='<div class="result-card"><div class="loading-dots"><span></span><span></span><span></span></div></div>';
  const hits=applyGlossary(text);
  try{
    let r;
    if(state.engine==='claude'&&state.claudeKey) r=await translateWithClaude(text,from,to,hits);
    else if(state.engine==='google'&&state.googleKey) r=await translateWithGoogle(text,from,to);
    else r=await translateWithMyMemory(text,from,to);
    state.lastTranslatedText=r.translated;state.lastTranslatedLang=to;
    renderTextResult(r,from,to,hits);
    if(state.autoSpeak&&r.translated) speak(r.translated,to);
  }catch(e){re.innerHTML=`<div class="result-card"><div class="result-section" style="color:var(--warn)">翻訳エラー: ${escHtml(e.message)}</div></div>`}
  finally{btn.disabled=false;btn.innerHTML=`<span>${t('translate')}</span> →`}
}

function renderTextResult(r,from,to,hits) {
  const el=document.getElementById('textResult');
  const eng=state.engine==='claude'?'Claude AI':state.engine==='google'?'Google':'MyMemory';
  let html=`<div class="result-card">`;
  if(hits&&hits.length>0){
    html+=`<div class="result-section"><div class="result-label">📚 <span class="badge badge-glossary">${hits.length}</span></div>
    <div class="glossary-hits">${hits.slice(0,5).map(h=>`<div class="glossary-hit-item"><strong>${escHtml(h.term)}</strong> → ${escHtml(h.simple)}</div>`).join('')}</div></div>`;
  }
  if(from==='ja'&&r.simplified&&r.simplified!==r.original){
    html+=`<div class="result-section"><div class="result-label">🔄 ${t('simplified')} <span class="badge badge-ok">✓</span></div><div class="result-simplified">${escHtml(r.simplified)}</div></div>`;
  }
  html+=`<div class="result-section">
    <div class="result-label">🌐 ${langNames[to]||to} <span class="badge badge-engine">${eng}</span></div>
    <div class="result-main">${escHtml(r.translated)}</div>
    <div class="result-actions">
      <button class="play-btn" onclick="speak('${escJs(r.translated)}','${to}')">🔊 ${t('speak')}</button>
      <button class="copy-btn" onclick="copyText('${escJs(r.translated)}')">📋 ${t('copy')}</button>
    </div></div>`;
  if(r.backTranslation){
    const ok=r.backOk!==false;
    html+=`<div class="result-section"><div class="result-label">🔍 ${t('meaning_check')} <span class="badge ${ok?'badge-ok':'badge-warn'}">${ok?t('match_ok'):t('match_warn')}</span></div><div class="result-back">${escHtml(r.backTranslation)}</div></div>`;
  }
  html+=`</div>`;el.innerHTML=html;
}

// ===== 翻訳エンジン =====
async function translateWithMyMemory(text,from,to) {
  const fc=mymemoryLangMap[from]||from,tc=mymemoryLangMap[to]||to;
  const res=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fc}|${tc}`);
  const data=await res.json();
  if(!data.responseData?.translatedText) throw new Error('翻訳失敗');
  const translated=data.responseData.translatedText;
  let backTranslation=null;
  try{const b=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(translated)}&langpair=${tc}|${fc}`);const bd=await b.json();backTranslation=bd.responseData?.translatedText||null}catch(e){}
  return{original:text,simplified:null,translated,backTranslation};
}
async function translateWithGoogle(text,from,to) {
  const url=`https://translation.googleapis.com/language/translate/v2?key=${state.googleKey}`;
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({q:text,source:from,target:to,format:'text'})});
  const data=await res.json();
  if(data.error) throw new Error(data.error.message);
  const translated=data.data.translations[0].translatedText;
  let backTranslation=null;
  try{const b=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({q:translated,source:to,target:from,format:'text'})});const bd=await b.json();backTranslation=bd.data?.translations[0]?.translatedText||null}catch(e){}
  return{original:text,simplified:null,translated,backTranslation};
}
async function translateWithClaude(text,from,to,hits) {
  const fn=langNames[from]||from,tn=langNames[to]||to;
  const custom=loadCustomGlossary();
  const glossCtx=hits&&hits.length>0?`\n【参照用語集】${hits.map(h=>`「${h.term}」→「${h.simple}」`).join('、')}`:'';
  const customCtx=custom.length>0?`\n【施設カスタム用語】${custom.slice(0,20).map(h=>`「${h.term}」＝「${h.simple}」`).join('、')}`:'';
  const sceneCtx=state.careMode?`\n【現在のシーン】${I18N.ja['scene_'+state.careScene]||'介護・医療'}に特化した表現を使ってください`:'';
  const sys=`あなたは日本の介護・医療現場に特化した通訳者です。以下のJSONのみ出力してください：{"simplified":"やさしい日本語（日本語入力時のみ、外国語はnull）","translated":"翻訳結果","backTranslation":"逆翻訳","backOk":true}`;
  const usr=`${fn}から${tn}に翻訳。${state.politeMode&&from==='ja'?'①やさしい日本語化②翻訳③逆翻訳確認':'①翻訳②逆翻訳確認'}${glossCtx}${customCtx}${sceneCtx}\n\n入力:"${text}"`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':state.claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:sys,messages:[{role:'user',content:usr}]})});
  const data=await res.json();
  if(data.error) throw new Error(data.error.message);
  const raw=data.content[0].text.trim().replace(/```json|```/g,'').trim();
  const parsed=JSON.parse(raw);parsed.original=text;return parsed;
}

async function sendConvMessage() {
  const text=document.getElementById('convTextIn').value.trim();if(!text)return;
  document.getElementById('convTextIn').value='';
  const s=state.convSpeaker;
  const from=s==='jp'?document.getElementById('langFrom').value:document.getElementById('langTo').value;
  const to=s==='jp'?document.getElementById('langTo').value:document.getElementById('langFrom').value;
  const hits=applyGlossary(text);
  addConvMsg({speaker:s,original:text,translated:'...',backTranslation:null,loading:true});
  try{
    let r;
    if(state.engine==='claude'&&state.claudeKey) r=await translateWithClaude(text,from,to,hits);
    else if(state.engine==='google'&&state.googleKey) r=await translateWithGoogle(text,from,to);
    else r=await translateWithMyMemory(text,from,to);
    updateLastConvMsg({speaker:s,original:text,translated:r.translated,backTranslation:r.backTranslation});
    if(state.autoSpeak) speak(r.translated,to);
  }catch(e){updateLastConvMsg({speaker:s,original:text,translated:'Error',backTranslation:null})}
}
function addConvMsg(m){state.convMessages.push(m);renderConvMessages()}
function updateLastConvMsg(m){state.convMessages[state.convMessages.length-1]=m;renderConvMessages()}
function renderConvMessages() {
  const el=document.getElementById('convMessages');
  if(!state.convMessages.length){el.innerHTML=`<div style="text-align:center;color:var(--text-small);font-size:13px;padding:20px 0">${t('conv_hint')}</div>`;return}
  el.innerHTML=state.convMessages.map(m=>{
    const isJp=m.speaker==='jp';
    return`<div class="conv-msg ${isJp?'msg-jp':'msg-foreign'}">
      <div class="conv-msg-header"><div class="conv-msg-icon">${isJp?'🇯🇵':'🌏'}</div><span style="font-size:12px;color:var(--text-small)">${isJp?t('jp_staff'):langNames[document.getElementById('langTo').value]||''}</span></div>
      <div class="conv-msg-original">${escHtml(m.original)}</div>
      <div class="conv-msg-translated">${escHtml(m.translated)}</div>
      ${m.backTranslation?`<div class="conv-msg-back">🔍 ${escHtml(m.backTranslation)}</div>`:''}
      ${!m.loading&&m.translated!=='Error'?`<div style="margin-top:6px"><button class="play-btn" onclick="speak('${escJs(m.translated)}','')" style="padding:4px 10px;font-size:12px;">🔊 ${t('speak')}</button></div>`:''}
    </div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

// ===== 同時通訳 =====
let liveBuffer='',liveTimer=null,currentLiveResult={translated:'',backTranslation:''};
function toggleLive(){state.isLiveActive?stopLive():startLive()}
function startLive() {
  if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){showToast(t('error_chrome'));return}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition,r=new SR();
  const from=document.getElementById('langFrom').value,to=document.getElementById('langTo').value;
  r.lang=bcp47Map[from]||'ja-JP';r.continuous=true;r.interimResults=true;
  r.onresult=e=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){const tx=e.results[i][0].transcript;e.results[i].isFinal?final+=tx:interim+=tx}
    document.getElementById('liveOriginal').textContent=interim||final||'...';
    if(final){liveBuffer+=final+' ';clearTimeout(liveTimer);liveTimer=setTimeout(()=>processLiveBuffer(from,to),800)}
  };
  r.onend=()=>{if(state.isLiveActive){try{r.start()}catch(e){}}};
  r.onerror=e=>{if(e.error==='no-speech')return};
  r.start();state.liveRecognition=r;state.isLiveActive=true;
  document.getElementById('liveDot').classList.add('active');
  applyI18n();
}
function stopLive() {
  state.liveRecognition?.stop();state.liveRecognition=null;state.isLiveActive=false;clearTimeout(liveTimer);
  document.getElementById('liveDot').classList.remove('active');
  applyI18n();
}
async function processLiveBuffer(from,to) {
  const text=liveBuffer.trim();if(!text)return;liveBuffer='';
  document.getElementById('liveTranslated').style.color='var(--text-small)';
  document.getElementById('liveTranslated').textContent='...';
  document.getElementById('liveBackText').textContent='...';
  document.getElementById('livePlayBtn').style.display='none';
  const hits=applyGlossary(text);
  try{
    let translated,backTranslation;
    if(state.engine==='claude'&&state.claudeKey){const r=await translateWithClaude(text,from,to,hits);translated=r.translated;backTranslation=r.backTranslation}
    else if(state.engine==='google'&&state.googleKey){const r=await translateWithGoogle(text,from,to);translated=r.translated;backTranslation=r.backTranslation}
    else{const r=await translateWithMyMemory(text,from,to);translated=r.translated;backTranslation=r.backTranslation}
    currentLiveResult={translated,backTranslation};
    document.getElementById('liveTranslated').style.color='var(--text)';
    document.getElementById('liveTranslated').textContent=translated;
    document.getElementById('liveBackText').textContent=(state.liveBackTranslate&&backTranslation)?backTranslation:'—';
    document.getElementById('livePlayBtn').style.display='';
    addLiveHistory({original:text,translated,backTranslation});
    if(state.autoSpeak) speak(translated,to);
  }catch(e){document.getElementById('liveTranslated').textContent='Error'}
}
function playLiveAudio(){speak(currentLiveResult.translated,document.getElementById('langTo').value)}
function addLiveHistory(item) {
  state.liveHistory.unshift(item);
  const el=document.getElementById('liveHistoryList');
  el.innerHTML=state.liveHistory.map(h=>`
    <div class="live-history-item">
      <div class="history-original">${escHtml(h.original)}</div>
      <div class="history-translated">${escHtml(h.translated)}</div>
      ${h.backTranslation?`<div class="history-back">🔍 ${escHtml(h.backTranslation)}</div>`:''}
    </div>`).join('');
}
function clearHistory(){state.liveHistory=[];document.getElementById('liveHistoryList').innerHTML=''}

// ===== 音声出力 =====
function speak(text,langCode) {
  if(!text||text==='...'||text==='Error') return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=bcp47Map[langCode]||langCode||'ja-JP';u.rate=0.9;
  window.speechSynthesis.speak(u);
}

// ===== 用語集 =====
function openGlossary(){renderGlossaryList();document.getElementById('glossaryModal').classList.add('open')}
function closeGlossary(){document.getElementById('glossaryModal').classList.remove('open')}
function switchGlossaryTab(tab,btn) {
  state.currentGlossaryTab=tab;
  document.querySelectorAll('.glossary-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('addGlossaryForm').style.display=tab==='custom'?'block':'none';
  document.getElementById('glossarySearch').value='';
  renderGlossaryList();
}
function renderGlossaryList() {
  const q=document.getElementById('glossarySearch').value.toLowerCase();
  let list=state.currentGlossaryTab==='official'?OFFICIAL_GLOSSARY:state.currentGlossaryTab==='care'?CARE_GLOSSARY:loadCustomGlossary();
  if(q) list=list.filter(i=>i.term.includes(q)||i.simple.includes(q)||(i.note||'').includes(q));
  const isCust=state.currentGlossaryTab==='custom';
  const el=document.getElementById('glossaryList');
  if(!list.length){el.innerHTML=`<div style="padding:20px;text-align:center;color:var(--text-small);font-size:13px">—</div>`;return}
  el.innerHTML=list.map((item,idx)=>`
    <div class="glossary-item">
      <div class="glossary-item-content">
        <div class="glossary-term">${escHtml(item.term)}</div>
        <div class="glossary-simple">→ ${escHtml(item.simple)}</div>
        ${item.note?`<div class="glossary-note">${escHtml(item.note)}</div>`:''}
      </div>
      ${isCust?`<button class="glossary-del-btn" onclick="deleteCustomTerm(${idx})">🗑</button>`:''}
    </div>`).join('');
}
function addCustomTerm() {
  const term=document.getElementById('newTerm').value.trim();
  const simple=document.getElementById('newSimple').value.trim();
  const note=document.getElementById('newNote').value.trim();
  if(!term||!simple){showToast(t('term_required'));return}
  const list=loadCustomGlossary();list.unshift({term,simple,note});saveCustomGlossary(list);
  document.getElementById('newTerm').value='';document.getElementById('newSimple').value='';document.getElementById('newNote').value='';
  renderGlossaryList();showToast(t('added'));
}
function deleteCustomTerm(idx) {
  const list=loadCustomGlossary();list.splice(idx,1);saveCustomGlossary(list);renderGlossaryList();showToast(t('deleted'));
}

// ===== 設定 =====
function openSettings(){loadSettingsUI();document.getElementById('settingsModal').classList.add('open')}
function closeSettings(){document.getElementById('settingsModal').classList.remove('open')}
function selectEngine(e,btn) {
  state.engine=e;
  document.querySelectorAll('.engine-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');
  document.getElementById('googleKeyGroup').style.display=e==='google'?'block':'none';
  document.getElementById('claudeKeyGroup').style.display=e==='claude'?'block':'none';
}
function saveSettings() {
  state.googleKey=document.getElementById('googleApiKey').value;
  state.claudeKey=document.getElementById('claudeApiKey').value;
  state.politeMode=document.getElementById('politeMode').checked;
  state.riskWarning=document.getElementById('riskWarning').checked;
  state.autoSpeak=document.getElementById('autoSpeak').checked;
  state.liveBackTranslate=document.getElementById('liveBackTranslate').checked;
  localStorage.setItem('careVoiceEngine',state.engine);
  localStorage.setItem('careVoicePolite',state.politeMode);
  localStorage.setItem('careVoiceRisk',state.riskWarning);
  localStorage.setItem('careVoiceAutoSpeak',state.autoSpeak);
  localStorage.setItem('careVoiceLiveBack',state.liveBackTranslate);
  closeSettings();showToast(t('saved'));
}
function loadSettingsUI() {
  document.getElementById('politeMode').checked=state.politeMode;
  document.getElementById('riskWarning').checked=state.riskWarning;
  document.getElementById('autoSpeak').checked=state.autoSpeak;
  document.getElementById('liveBackTranslate').checked=state.liveBackTranslate;
  document.getElementById('googleApiKey').value=state.googleKey;
  document.getElementById('claudeApiKey').value=state.claudeKey;
  document.querySelectorAll('.engine-opt').forEach(b=>b.classList.remove('selected'));
  const idx={mymemory:0,google:1,claude:2}[state.engine]??0;
  document.querySelectorAll('.engine-opt')[idx]?.classList.add('selected');
  document.getElementById('googleKeyGroup').style.display=state.engine==='google'?'block':'none';
  document.getElementById('claudeKeyGroup').style.display=state.engine==='claude'?'block':'none';
}

// ===== ユーティリティ =====
function copyText(tx){navigator.clipboard.writeText(tx).then(()=>showToast(t('copied')))}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}
function escHtml(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escJs(s){if(!s)return'';return s.replace(/'/g,"\\'").replace(/\n/g,'\\n')}

// ===== 初期化 =====
(function init(){
  const se=localStorage.getItem('careVoiceEngine');if(se)state.engine=se;
  if(localStorage.getItem('careVoicePolite')!==null)state.politeMode=localStorage.getItem('careVoicePolite')==='true';
  if(localStorage.getItem('careVoiceRisk')!==null)state.riskWarning=localStorage.getItem('careVoiceRisk')==='true';
  if(localStorage.getItem('careVoiceAutoSpeak')!==null)state.autoSpeak=localStorage.getItem('careVoiceAutoSpeak')==='true';
  if(localStorage.getItem('careVoiceLiveBack')!==null)state.liveBackTranslate=localStorage.getItem('careVoiceLiveBack')==='true';

  applyI18n();updateLangLabels();

  document.getElementById('settingsModal').addEventListener('click',e=>{if(e.target===document.getElementById('settingsModal'))closeSettings()});
  document.getElementById('riskModal').addEventListener('click',e=>{if(e.target===document.getElementById('riskModal'))cancelRisk()});
  document.getElementById('glossaryModal').addEventListener('click',e=>{if(e.target===document.getElementById('glossaryModal'))closeGlossary()});
  document.getElementById('uilangModal').addEventListener('click',e=>{if(e.target===document.getElementById('uilangModal'))closeUiLang()});
  document.getElementById('textInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doTranslate()}});
  document.getElementById('convTextIn').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendConvMessage()}});
  document.getElementById('careScene').addEventListener('change',e=>{state.careScene=e.target.value});
})();
</script>
