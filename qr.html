<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareVoice QRコード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #f5f3ee;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 40px 48px;
    box-shadow: 0 8px 40px rgba(0,0,0,.12);
    text-align: center;
    max-width: 360px;
    width: 90%;
  }
  .logo { font-size: 36px; margin-bottom: 8px; }
  h1 { font-size: 22px; color: #2d6a4f; margin: 0 0 4px; }
  .sub { font-size: 13px; color: #9b9890; margin-bottom: 28px; }
  canvas { border-radius: 12px; }
  #qr { display:inline-block; }
  .url {
    margin-top: 20px;
    background: #f5f3ee;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: #444;
    word-break: break-all;
    font-family: monospace;
  }
  .hint { margin-top: 16px; font-size: 12px; color: #9b9890; line-height: 1.6; }
  .hint strong { color: #2d6a4f; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🌿</div>
  <h1>CareVoice</h1>
  <div class="sub">介護・医療現場AI通訳</div>
  <canvas id="qr"></canvas>
  <div class="url" id="urlText"></div>
  <div class="hint">
    スマホのカメラで読み取ってください<br>
    <strong>インターネット接続</strong> があれば使えます
  </div>
</div>
<script>
  const url = 'https://kouga-k.github.io/care-translator/care-translator-v9.html';
  document.getElementById('urlText').textContent = url;
  new QRCode(document.getElementById('qr'), {
    text: url,
    width: 240,
    height: 240,
    colorDark: '#2d6a4f',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
